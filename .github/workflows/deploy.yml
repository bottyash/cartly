name: Deploy Cartly to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dummy .env for tests
        run: |
          cat > .env << EOF
          OPENROUTER_API_KEY=test-key
          POSTGRES_DSN=postgresql://cartly:cartly_secret@localhost:5432/cartly
          ADMIN_TOKEN=cartly-admin-2026
          LOG_DIR=./observability/logs
          THRESHOLD_AMOUNT=500
          FAITHFULNESS_FLOOR=0.40
          EOF

      - name: Run unit + API tests
        run: |
          mkdir -p observability/logs
          pytest tests/ -v --ignore=tests/test_demo_tickets.py \
            -k "not test_fr8_count_equals_total_tickets" \
            2>&1 | tee test-results.txt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.txt

  # ── Job 2: Deploy ───────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    # SSH timeouts (EC2 stopped / Security Group blocking) must not
    # fail the workflow — tests already passed at this point.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.EC2_HOST }}
          username:        ubuntu
          key:             ${{ secrets.EC2_SSH_KEY }}
          port:            22
          timeout:         120s
          command_timeout: 10m
          script: |
            set -e
            echo "→ Pulling latest code..."
            cd ~/cartly
            git fetch origin main
            git reset --hard origin/main

            echo "→ Rebuilding and restarting..."
            docker compose up -d --build

            echo "→ Health check..."
            sleep 10
            curl -sf http://localhost:8000/health || echo "API not ready yet"

            echo "✅ Deploy complete!"
            docker ps --format "table {{.Names}}\t{{.Status}}"
