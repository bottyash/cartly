<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cartly — Product Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;border:none;outline:none}

/* NAV */
.topnav{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1px solid #e2e8f0;height:62px;display:flex;align-items:center;padding:0 32px;gap:12px}
.tn-icon{width:34px;height:34px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.tn-name{font-size:19px;font-weight:800;letter-spacing:-.5px}
.tn-sp{flex:1}
.nav-link{font-size:13px;font-weight:500;color:#64748b;padding:6px 12px;border-radius:7px;transition:all .15s}
.nav-link:hover{background:#f1f5f9;color:#1e293b}
.nav-link.active{color:#1d4ed8;background:#eff6ff}

/* PAGE HEADER */
.page-hd{background:linear-gradient(135deg,#0f172a,#1e3a8a);padding:40px 32px;color:#fff}
.page-hd-t{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.page-hd-s{font-size:15px;color:rgba(255,255,255,.6);margin-bottom:24px}
.search-row{display:flex;gap:10px;max-width:540px}
.search-inp{flex:1;padding:11px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);color:#fff;font-size:15px;font-family:inherit}
.search-inp::placeholder{color:rgba(255,255,255,.4)}
.search-inp:focus{outline:none;border-color:rgba(255,255,255,.4)}
.search-btn{padding:11px 20px;background:#1d4ed8;color:#fff;border-radius:10px;font-size:14px;font-weight:600;transition:background .15s}
.search-btn:hover{background:#1e40af}

/* CATEGORY FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;padding:18px 32px;background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto}
.filter-chip{padding:6px 16px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;color:#475569;cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-chip:hover{border-color:#1d4ed8;color:#1d4ed8}
.filter-chip.active{background:#1d4ed8;border-color:#1d4ed8;color:#fff}

/* GRID */
.catalog-wrap{max-width:1200px;margin:0 auto;padding:24px 32px}
.catalog-meta{font-size:13px;color:#64748b;margin-bottom:16px}
.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
@media(max-width:600px){.catalog-grid{grid-template-columns:1fr}}

/* PRODUCT CARD */
.prod-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .2s;cursor:pointer}
.prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:#cbd5e1}
.prod-card-img{height:130px;display:flex;align-items:center;justify-content:center;font-size:54px;background:linear-gradient(135deg,#f8fafc,#f1f5f9)}
.prod-card-body{padding:16px}
.prod-card-cat{font-size:11px;font-weight:700;color:#64748b;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.prod-card-name{font-size:15px;font-weight:700;color:#0f172a;line-height:1.35;margin-bottom:8px}
.prod-card-desc{font-size:13px;color:#64748b;line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-card-ft{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.prod-price{font-size:20px;font-weight:800;color:#0f172a}
.prod-rating{font-size:13px;color:#64748b;display:flex;align-items:center;gap:4px}
.prod-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px}
.badge-ret{background:#ecfdf5;color:#059669}
.badge-nret{background:#fef2f2;color:#dc2626}
.badge-cond{background:#fffbeb;color:#d97706}
.stock-out{background:#f8fafc;color:#94a3b8}
.prod-ask-btn{width:100%;padding:9px;border-radius:9px;font-size:13px;font-weight:700;background:#1d4ed8;color:#fff;transition:background .15s}
.prod-ask-btn:hover{background:#1e40af}
.prod-ask-btn.out{background:#f1f5f9;color:#94a3b8;cursor:not-allowed}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#94a3b8}
.empty-ico{font-size:48px;margin-bottom:14px}
.empty-t{font-size:17px;font-weight:600;color:#64748b}

/* POLICY STRIP */
.policy-strip{background:#0f172a;padding:16px 32px;display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:40px}
.pol-item{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(255,255,255,.45);font-weight:500;cursor:pointer;transition:color .15s}
.pol-item:hover{color:rgba(255,255,255,.8)}

/* MODAL */
.modal-ov{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal-hd{padding:18px 22px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.modal-t{font-size:15px;font-weight:700}
.modal-x{width:28px;height:28px;border-radius:50%;background:#f1f5f9;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;color:#64748b}
.modal-x:hover{background:#e2e8f0}
.modal-body{padding:22px}
.modal-prod-ico{font-size:54px;text-align:center;margin-bottom:14px}
.modal-prod-name{font-size:20px;font-weight:800;margin-bottom:6px}
.modal-prod-desc{font-size:14px;color:#64748b;line-height:1.65;margin-bottom:18px}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f8fafc;font-size:13px}
.modal-row:last-child{border:none}
.modal-key{color:#64748b}
.modal-val{font-weight:600;color:#1e293b}
.modal-ask-btn{width:100%;margin-top:18px;padding:13px;background:#1d4ed8;color:#fff;border-radius:10px;font-size:15px;font-weight:700;transition:background .15s}
.modal-ask-btn:hover{background:#1e40af}
</style>
</head>
<body>

<nav class="topnav">
  <div class="tn-icon">🛒</div>
  <span class="tn-name">Cartly</span>
  <div class="tn-sp"></div>
  <a href="index.html" class="nav-link">Home</a>
  <a href="catalog.html" class="nav-link active">Catalog</a>
  <a href="user.html" class="nav-link">Support</a>
</nav>

<div class="page-hd">
  <div class="page-hd-t">Product Catalog</div>
  <div class="page-hd-s">Browse 12+ products across 5 categories — click any product to ask about its return policy, warranty, and more.</div>
  <div class="search-row">
    <input id="search-inp" class="search-inp" placeholder="Search products — e.g. bluetooth speaker, yoga mat…" oninput="renderGrid()"/>
    <button class="search-btn" onclick="renderGrid()">Search</button>
  </div>
</div>

<div class="filters" id="filters-row">
  <button class="filter-chip active" data-cat="all" onclick="setFilter('all',this)">All</button>
</div>

<div class="catalog-wrap">
  <div class="catalog-meta" id="catalog-meta"></div>
  <div class="catalog-grid" id="catalog-grid"></div>
</div>

<div class="policy-strip" id="policy-strip"></div>

<!-- Product Detail Modal -->
<div class="modal-ov" id="prod-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-hd">
      <div class="modal-t" id="modal-title">Product Details</div>
      <div class="modal-x" onclick="closeProdModal()">×</div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let allProducts = [];
let activeFilter = 'all';

const CATEGORY_ICONS = {
  electronics: '⚡', clothing: '👕', home: '🏠', books: '📚',
  sports: '🏃', beauty: '✨', default: '📦'
};

async function loadProducts() {
  try {
    const r = await fetch(`${API}/products`);
    const d = await r.json();
    allProducts = d.products || [];
    buildFilters();
    renderGrid();
  } catch {
    document.getElementById('catalog-grid').innerHTML =
      '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-t">Could not connect to API. Make sure the server is running.</div></div>';
  }
}

function buildFilters() {
  const cats = [...new Set(allProducts.map(p => p.category))].sort();
  const row = document.getElementById('filters-row');
  row.innerHTML = '<button class="filter-chip active" data-cat="all" onclick="setFilter(\'all\',this)">All</button>';
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip';
    btn.dataset.cat = c;
    btn.onclick = () => setFilter(c, btn);
    btn.textContent = `${CATEGORY_ICONS[c] || '📦'} ${c.charAt(0).toUpperCase() + c.slice(1)}`;
    row.appendChild(btn);
  });
}

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const q = document.getElementById('search-inp').value.toLowerCase().trim();
  let products = allProducts;
  if (activeFilter !== 'all') products = products.filter(p => p.category === activeFilter);
  if (q) products = products.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.description.toLowerCase().includes(q) ||
    (p.tags || []).some(t => t.includes(q) || q.includes(t))
  );

  document.getElementById('catalog-meta').textContent = `Showing ${products.length} product${products.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('catalog-grid');
  if (!products.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">No products match your search</div></div>';
    return;
  }

  grid.innerHTML = products.map(p => {
    const ico = CATEGORY_ICONS[p.category] || '📦';
    const badgeClass = !p.in_stock ? 'stock-out' : p.is_returnable ? 'badge-ret' : 'badge-nret';
    const badgeText = !p.in_stock ? '⚪ Out of Stock' : p.is_returnable ? '✅ Returnable' : '❌ Non-Returnable';
    const stars = '⭐'.repeat(Math.round(p.rating));
    return `
      <div class="prod-card" onclick="showProduct('${p.id}')">
        <div class="prod-card-img">${ico}</div>
        <div class="prod-card-body">
          <div class="prod-card-cat">${p.category} · ${p.sub_category}</div>
          <div class="prod-card-name">${esc(p.name)}</div>
          <div class="prod-card-desc">${esc(p.description)}</div>
          <div class="prod-card-ft">
            <span class="prod-price">₹${p.price.toLocaleString('en-IN')}</span>
            <span class="prod-rating">${p.rating} ⭐</span>
          </div>
          <div class="prod-badge ${badgeClass}">${badgeText}</div>
          <button class="prod-ask-btn ${p.in_stock ? '' : 'out'}" onclick="event.stopPropagation();${p.in_stock ? `askAbout('${p.id}')` : ''}">
            ${p.in_stock ? '💬 Ask about this product' : 'Out of Stock'}
          </button>
        </div>
      </div>`;
  }).join('');
}

function showProduct(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-prod-ico">${CATEGORY_ICONS[p.category] || '📦'}</div>
    <div class="modal-prod-name">${esc(p.name)}</div>
    <div class="modal-prod-desc">${esc(p.description)}</div>
    <div class="modal-row"><span class="modal-key">Price</span><span class="modal-val">₹${p.price.toLocaleString('en-IN')}</span></div>
    <div class="modal-row"><span class="modal-key">Category</span><span class="modal-val">${p.category} › ${p.sub_category}</span></div>
    <div class="modal-row"><span class="modal-key">Rating</span><span class="modal-val">${p.rating} / 5 ⭐</span></div>
    <div class="modal-row"><span class="modal-key">Availability</span><span class="modal-val">${p.in_stock ? '✅ In Stock' : '⚪ Out of Stock'}</span></div>
    <div class="modal-row"><span class="modal-key">Returnable</span><span class="modal-val">${p.is_returnable ? '✅ Yes' : '❌ No'}</span></div>
    <div class="modal-row"><span class="modal-key">Return Window</span><span class="modal-val">${p.return_window_days} days</span></div>
    <div class="modal-row"><span class="modal-key">Return Condition</span><span class="modal-val" style="text-align:right;max-width:60%">${esc(p.return_condition)}</span></div>
    <div class="modal-row"><span class="modal-key">Warranty</span><span class="modal-val">${p.warranty_months ? p.warranty_months + ' months' : 'No warranty'}</span></div>
    <button class="modal-ask-btn" onclick="askAbout('${p.id}')">💬 Ask about this product</button>
  `;
  document.getElementById('prod-modal').style.display = 'flex';
}

function askAbout(productId) {
  const p = allProducts.find(x => x.id === productId);
  if (!p) return;
  closeProdModal();
  // Pass product name as prefilled query to user.html generic chat
  const q = encodeURIComponent(`Tell me about the return policy for ${p.name}`);
  window.location.href = `user.html?mode=generic&query=${q}`;
}

function closeProdModal() { document.getElementById('prod-modal').style.display = 'none'; }
function closeModal(e) { if (e.target === document.getElementById('prod-modal')) closeProdModal(); }

async function loadPolicies() {
  try {
    const r = await fetch(`${API}/policies`);
    const d = await r.json();
    const strip = document.getElementById('policy-strip');
    strip.innerHTML = d.policies.map(p =>
      `<div class="pol-item" onclick="alert('${esc(p.title)}\\n\\n${esc(p.text)}\\n\\n${esc(p.clause)}')">📋 ${p.title}</div>`
    ).join('');
  } catch {}
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadProducts();
loadPolicies();
</script>
</body>
</html>
